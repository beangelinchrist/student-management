<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f4c81,#3f87a6,#6dd5ed);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
padding:30px;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:95%;
max-width:1200px;
margin:auto;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.header{
background:linear-gradient(90deg,#1565c0,#42a5f5);
padding:30px;
color:#fff;
text-align:center;
}

.header h1{
font-size:38px;
}

.header p{
margin-top:10px;
font-size:18px;
}

.dashboard{
display:flex;
justify-content:space-around;
gap:20px;
padding:25px;
background:#eef6ff;
flex-wrap:wrap;
}

.card{
width:220px;
background:#fff;
border-radius:15px;
padding:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
font-size:35px;
color:#1565c0;
}

.card p{
margin-top:10px;
font-weight:bold;
}

.form-section{
padding:25px;
}

.form-title{
font-size:25px;
margin-bottom:20px;
color:#1565c0;
}

.form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.form input,
.form select,
.form textarea{

padding:12px;

border:2px solid #90caf9;

border-radius:8px;

font-size:16px;

outline:none;

}

.form textarea{

grid-column:span 2;

resize:none;

height:70px;

}

.form button{

padding:14px;

border:none;

border-radius:8px;

font-size:17px;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

#saveBtn{

background:#1565c0;

color:white;

}

#saveBtn:hover{

background:#0d47a1;

}

#clearBtn{

background:#757575;

color:white;

}

#clearBtn:hover{

background:#424242;

}

.search-box{

padding:25px;

}

.search-box input{

width:100%;

padding:14px;

font-size:16px;

border-radius:10px;

border:2px solid #42a5f5;

}

.table-section{

padding:25px;

overflow-x:auto;

}

table{

width:100%;

border-collapse:collapse;

}

table th{

background:#1565c0;

color:white;

padding:14px;

}

table td{

padding:12px;

text-align:center;

border-bottom:1px solid #ddd;

}

tr:nth-child(even){

background:#f7fbff;

}

tr:hover{

background:#e3f2fd;

}

.edit{

background:#ff9800;

border:none;

padding:8px 15px;

border-radius:5px;

color:white;

cursor:pointer;

}

.delete{

background:#e53935;

border:none;

padding:8px 15px;

border-radius:5px;

color:white;

cursor:pointer;

}

.edit:hover{

background:#ef6c00;

}

.delete:hover{

background:#c62828;

}

.footer{

background:#1565c0;

color:white;

text-align:center;

padding:18px;

font-size:16px;

}

@media(max-width:768px){

.form{

grid-template-columns:1fr;

}

.form textarea{

grid-column:span 1;

}

.dashboard{

flex-direction:column;

align-items:center;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🎓 Student Management System</h1>

<p>Web Development Internship Project</p>

</div>

<div class="dashboard">

<div class="card">
<h2 id="totalStudents">0</h2>
<p>Total Students</p>
</div>

<div class="card">
<h2>5</h2>
<p>Departments</p>
</div>

<div class="card">
<h2 id="recordCount">0</h2>
<p>Records</p>
</div>

<div class="card">
<h2>2026</h2>
<p>Academic Year</p>
</div>

</div>

<div class="form-section">

<h2 class="form-title">Student Registration Form</h2>

<div class="form">

<input type="text" id="sid" placeholder="Student ID">

<input type="text" id="name" placeholder="Student Name">

<input type="email" id="email" placeholder="Email Address">

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="department" placeholder="Department">

<input type="text" id="course" placeholder="Course">

<select id="gender">

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<input type="text" id="year" placeholder="Year">

<textarea id="address" placeholder="Address"></textarea>

<button id="saveBtn" onclick="saveData()">Save Student</button>

<button id="clearBtn" onclick="clearForm()">Clear Form</button>

</div>

</div>

<div class="search-box">

<input
type="text"
id="search"
placeholder="🔍 Search Student by Name..."
onkeyup="searchData()">

</div>

<div class="table-section">

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Department</th>

<th>Course</th>

<th>Gender</th>

<th>Year</th>

<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>
